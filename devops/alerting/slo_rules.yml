# SLO Recording Rules for yallmp
#
# Targets:
#   - Availability: 99.9% (error rate < 0.1%)
#   - P99 latency: < 30s (LLM proxy calls are inherently slow)
#   - P95 latency: < 10s
#
# Add to your Prometheus config:  rule_files: ["slo_rules.yml"]

groups:
  # ── Availability SLO (99.9%) ───────────────────────────────────────────
  - name: yallmp_slo_availability
    interval: 30s
    rules:
      # Fraction of successful requests (non-5xx) over sliding windows
      - record: yallmp:slo_availability:ratio_rate5m
        expr: |
          1 - (
            sum(rate(http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(http_requests_total[5m]))
          )

      - record: yallmp:slo_availability:ratio_rate30m
        expr: |
          1 - (
            sum(rate(http_requests_total{status_code=~"5.."}[30m]))
            /
            sum(rate(http_requests_total[30m]))
          )

      - record: yallmp:slo_availability:ratio_rate1h
        expr: |
          1 - (
            sum(rate(http_requests_total{status_code=~"5.."}[1h]))
            /
            sum(rate(http_requests_total[1h]))
          )

      - record: yallmp:slo_availability:ratio_rate6h
        expr: |
          1 - (
            sum(rate(http_requests_total{status_code=~"5.."}[6h]))
            /
            sum(rate(http_requests_total[6h]))
          )

      - record: yallmp:slo_availability:ratio_rate24h
        expr: |
          1 - (
            sum(rate(http_requests_total{status_code=~"5.."}[24h]))
            /
            sum(rate(http_requests_total[24h]))
          )

      # Error budget: how much of the 0.1% budget has been consumed (24h window)
      - record: yallmp:slo_availability:error_budget_remaining
        expr: |
          1 - (
            (1 - yallmp:slo_availability:ratio_rate24h)
            /
            (1 - 0.999)
          )

  # ── Latency SLO (P99 < 30s, P95 < 10s) ───────────────────────────────
  - name: yallmp_slo_latency
    interval: 30s
    rules:
      - record: yallmp:slo_latency:p95_5m
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          )

      - record: yallmp:slo_latency:p99_5m
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          )

      - record: yallmp:slo_latency:p95_1h
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[1h])) by (le)
          )

      - record: yallmp:slo_latency:p99_1h
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket[1h])) by (le)
          )

      # Fraction of requests completing within 30s (latency SLO compliance)
      - record: yallmp:slo_latency:ratio_rate5m
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="30"}[5m]))
          /
          sum(rate(http_request_duration_seconds_count[5m]))

      - record: yallmp:slo_latency:ratio_rate1h
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="30"}[1h]))
          /
          sum(rate(http_request_duration_seconds_count[1h]))

      - record: yallmp:slo_latency:ratio_rate24h
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="30"}[24h]))
          /
          sum(rate(http_request_duration_seconds_count[24h]))

  # ── LLM Cost SLO ──────────────────────────────────────────────────────
  - name: yallmp_slo_cost
    interval: 30s
    rules:
      # Hourly cost rate for capacity planning
      - record: yallmp:cost:rate1h
        expr: |
          sum(rate(llm_cost_total[1h])) * 3600

      # Token burn rate per hour
      - record: yallmp:tokens:rate1h
        expr: |
          sum(rate(llm_total_token_usage_total[1h])) * 3600

  # ── Request Volume (for capacity planning) ────────────────────────────
  - name: yallmp_slo_throughput
    interval: 30s
    rules:
      - record: yallmp:throughput:rate5m
        expr: |
          sum(rate(http_requests_total[5m]))

      - record: yallmp:throughput:rate1h
        expr: |
          sum(rate(http_requests_total[1h]))
